<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lake Huron Fetch</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
    <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #info-popup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.7);
            color: rgb(86, 84, 84);
            padding: 10px 15px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            z-index: 999;
        }

    </style>
</head>
<body>
    <div id="map" class="leaflet-container leaflet-touch leaflet-retina leaflet-fade-anim leaflet-grab leaflet-touch-drag leaflet-touch-zoom"></div>
    <div id="info-popup">
        <p id="wind-angle">Wind Angle: 0</p>
        <input id="angle-slider" type="range" min="0" max="359" step="1" value="0" />
        <p id="fetch">Fetch:</p>
        <p id="effective-fetch-angle">Effective Fetch Angle:</p>
        <p id="effective-fetch-distance">Effective Fetch Distance:</p>
    </div>
    <script>
        //Set up initial popup
        const map = L.map('map').setView([45.5, -82.4], 6);

        const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        //Get lake boundaries
        let lake_boundaries;

        fetch('great_lakes.geojson')
            .then(response => response.json())
            .then(data => {
                lake_boundaries = data.features[0];
                L.geoJSON(lake_boundaries).addTo(map);
            })
            .catch(error => console.error('Error loading GeoJSON:', error));

        //Check if cursor inside lakes
        let isInside = false;

        map.on('mousemove', function (e) {
            if (lake_boundaries) {
                var point = turf.point([e.latlng.lng, e.latlng.lat]);
                isInside = turf.booleanPointInPolygon(point, lake_boundaries);
            }
            //document.getElementById("info-popup").innerText = isInside ? "Inside the polygon" : "Outside the polygon";
        })

        //Use slider to change wind angle
        let wind_angle = 0;

        const slider = document.getElementById("angle-slider")
        
        slider.oninput = function() {
            document.getElementById("wind-angle").innerText = "Wind Angle: " + this.value
        }

        slider.onchange = function() {
            wind_angle = parseInt(this.value)
        }

        //Effective fetch equation
        function normalizeAngle(angle) {
            return ((angle % 360) + 360) % 360;
        }

        function calculateEffectiveFetch(lake, point, windAngle, angleRange = 90, angleStep = 1, maxFetch = 800) {
            let fetchDistances = [];
            let weightSum = 0;
            let fetchSum = 0;
            let maxFetchDistance = 0;
            let dominantAngle = windAngle;

            // Iterate over angles within ±angleRange of the wind direction
            for (let angleOffset = -angleRange / 2; angleOffset <= angleRange / 2; angleOffset += angleStep) {
                let angle = windAngle + angleOffset;
                
                // Compute destination point along this angle
                let destination = turf.destination(point, maxFetch, angle, { units: "kilometers" });
                let line = turf.lineString([point.geometry.coordinates, destination.geometry.coordinates]);

                // Intersect line with the lake boundary
                let intersection = turf.lineIntersect(line, lake);

                if (intersection.features.length > 0) {
                    let closestIntersection = intersection.features.reduce((closest, current) => {
                        let distToClosest = turf.distance(point, turf.point(closest.geometry.coordinates));
                        let distToCurrent = turf.distance(point, turf.point(current.geometry.coordinates));

                        // Return the closer intersection
                        return distToCurrent < distToClosest ? current : closest;
                    });

                    // Fetch distance is the distance to the first intersection point (in kilometers)
                    let fetchDistance = turf.distance(point, closestIntersection, { units: "kilometers" });
                    let weight = Math.cos(angleOffset * (Math.PI / 180)) ** 2;
                    
                    fetchDistances.push({ distance: fetchDistance, weight: weight, angle: angle });

                    // Track max fetch and corresponding angle
                    if (fetchDistance > maxFetchDistance) {
                        maxFetchDistance = fetchDistance;
                        dominantAngle = angle;
                    }

                    // Accumulate weighted sums
                    fetchSum += fetchDistance * weight;
                    weightSum += weight;
                }
            }

            // Compute weighted effective fetch (in kilometers)
            let effectiveFetch = weightSum > 0 ? fetchSum / weightSum : 0;

            return { "distance": effectiveFetch, "angle": dominantAngle };
        }

        //Add fetch and effective fetch layers
        let fetchLayer = null;
        let effectiveFetchLayer = null;

        map.on("click", function (e) {
            if (isInside) {
                let startPoint = turf.point([e.latlng.lng, e.latlng.lat])
                let distance = 700
                let endPoint = turf.destination(startPoint, distance, wind_angle, { units: 'kilometers' });

                let line = turf.lineString([
                    startPoint.geometry.coordinates,
                    endPoint.geometry.coordinates
                ]);

                // L.geoJSON(line, { color: 'red' }).addTo(map);

                let lakeBoundary = turf.multiPolygon(lake_boundaries.geometry.coordinates);
                let intersection = turf.lineIntersect(line, lakeBoundary);

                if (intersection.features.length > 0) {
                    let closestIntersection = intersection.features.reduce((closest, current) => {
                        let distToClosest = turf.distance(startPoint, turf.point(closest.geometry.coordinates));
                        let distToCurrent = turf.distance(startPoint, turf.point(current.geometry.coordinates));

                        // Return the closer intersection
                        return distToCurrent < distToClosest ? current : closest;
                    });

                    let finalLine = turf.lineString([
                        startPoint.geometry.coordinates,
                        closestIntersection.geometry.coordinates
                    ]);

                    // Add fetch layer to map
                    if (fetchLayer) {
                        map.removeLayer(fetchLayer);
                    }
                    fetchLayer = L.geoJSON(finalLine, { color: 'red' }).addTo(map);

                    // Add fetch to popup
                    let finalLineLength = turf.length(finalLine, {units: 'kilometers'})
                    document.getElementById("fetch").innerText = "Fetch: " + parseInt(finalLineLength) + " km"

                    // Add effective fetch angle, distance to popup
                    const effectiveFetchParams = calculateEffectiveFetch(lakeBoundary, startPoint, wind_angle)
                    const effectiveFetchAngle = normalizeAngle(effectiveFetchParams["angle"])
                    const effectiveFetchDistance = effectiveFetchParams["distance"]
                    document.getElementById("effective-fetch-angle").innerText = "Effective Fetch Angle: " + parseInt(effectiveFetchAngle) 
                    document.getElementById("effective-fetch-distance").innerText = "Effective Fetch Distance: " + parseInt(effectiveFetchDistance) + " km"

                    //Add effective fetch layer to map
                    if (effectiveFetchLayer) {
                        map.removeLayer(effectiveFetchLayer);
                    }

                    const effective_fetch_endpoint = turf.destination(startPoint, effectiveFetchDistance, effectiveFetchAngle, { units: "kilometers" });
                    effectiveFetchLayer = L.polyline(
                        [
                            [startPoint.geometry.coordinates[1], startPoint.geometry.coordinates[0]], // Start point (Lat, Lng)
                            [effective_fetch_endpoint.geometry.coordinates[1], effective_fetch_endpoint.geometry.coordinates[0]] // End point (Lat, Lng)
                        ],
                        { color: "yellow"}
                    ).addTo(map);
                } else {
                    alert("No intersection found!");
                }
            }
        })

    </script>
</body>
</html>
